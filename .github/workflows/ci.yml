name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [test, check, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.task }}
        run: npm run ${{ matrix.task }}

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    # Run inside the pinned Playwright image (browsers pre-installed). Visual
    # snapshots are captured in this exact image locally via `npm run
    # test:e2e:docker` (or `ddev playwright`), so rendering is byte-identical
    # here — no OS-specific baselines to maintain. Keep this tag in lockstep
    # with the @playwright/test version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run UI tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
